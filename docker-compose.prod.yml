# Docker Compose for standalone deployment (VPS, Synology, etc.)
# Uses pre-built image from GitHub Container Registry
#
# Usage:
#   1. Copy this file and .env.example to your server
#   2. Rename .env.example to .env and fill in your values
#   3. docker compose -f docker-compose.prod.yml up -d
#
# If the image is private, authenticate first:
#   echo YOUR_GITHUB_TOKEN | docker login ghcr.io -u YOUR_GITHUB_USERNAME --password-stdin

services:
  app:
    image: ghcr.io/lemonsieurxav80/rs-max:latest
    ports:
      - "80:80"
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-rs_max}
      DB_USERNAME: ${DB_USERNAME:-rs_max}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - media_data:/var/www/html/storage/app/private/media
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-rs_max}
      MYSQL_USER: ${DB_USERNAME:-rs_max}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
  media_data:
